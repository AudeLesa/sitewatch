<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SiteWatch — Texas Commercial Construction, Live</title>
  <meta name="description" content="A live map of every commercial construction site in Texas — filter by category, value, and stage; see the owner and architect for every project. Free, updated daily from TDLR TABS." />
  <meta name="theme-color" content="#f2dcd8" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f2dcd8;            /* blush ground */
      --panel: #fdf6f0;         /* cream card */
      --card: #ffffff;
      --tint: #f8e9e0;          /* blush row / chip tint */
      --border: #efdcd3;
      --ink: #232a52;           /* deep navy text */
      --muted: #7a7f9e;
      --faint: #aab0c8;
      --primary: #313f9f;       /* deep indigo */
      --primary-soft: #e4e7f8;
      --pink: #ef9fab;
      --good: #3f9d77;
      --new: #e9a23b;
      --shadow: 0 18px 44px rgba(49, 63, 159, .13);
      --sidebar-w: 348px; --detail-w: 384px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
      font-family: Poppins, "Segoe UI", system-ui, -apple-system, sans-serif; }
    button { font-family: inherit; }
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 8px; }
    #app { height: 100%; }
    #map { position: absolute; inset: 0; background: #ead9d4; z-index: 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }

    /* floating sidebar card */
    #sidebar { position: fixed; left: 16px; top: 16px; bottom: 16px; width: var(--sidebar-w); z-index: 1050;
      background: var(--panel); border-radius: 26px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
      transition: transform .28s ease; }
    #app.collapsed #sidebar { transform: translateX(calc(-100% - 28px)); }
    #sb-toggle { position: fixed; top: 24px; left: calc(16px + var(--sidebar-w) + 12px); z-index: 1100;
      width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--card); color: var(--primary);
      cursor: pointer; font-size: 18px; line-height: 1; display: grid; place-items: center;
      box-shadow: 0 8px 24px rgba(49,63,159,.18); transition: left .28s ease; }
    #app.collapsed #sb-toggle { left: 28px; }
    #sb-toggle:hover { background: var(--primary); color: #fff; }

    #brand { padding: 18px 20px 14px; }
    #brand h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: .1px; }
    #brand h1 .dot { color: var(--pink); }
    .meta-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    #badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: var(--tint); color: var(--muted); }
    #badge.live { color: #1e7d59; background: #ddefe6; }
    #badge.demo { color: #9a6a12; background: #f7e8cd; }
    #badge.stale { color: #a35d17; background: #f7e3cd; }
    #through { font-size: 11px; color: var(--faint); }

    .controls { padding: 4px 20px 14px; overflow-y: auto; }
    .controls::-webkit-scrollbar { width: 8px; } .controls::-webkit-scrollbar-thumb { background: #e8d3c9; border-radius: 8px; }
    label.lbl { display: block; font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin: 15px 0 7px; }
    #search { width: 100%; padding: 11px 14px; border-radius: 14px; border: 1px solid transparent; background: var(--card);
      color: var(--ink); font-size: 13px; font-family: inherit; box-shadow: 0 3px 12px rgba(49,63,159,.07); }
    #search::placeholder { color: var(--faint); }
    #search:focus { outline: none; border-color: var(--primary); }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 6px 12px;
      border-radius: 999px; border: none; background: var(--card); color: var(--ink); cursor: pointer; user-select: none;
      box-shadow: 0 2px 8px rgba(49,63,159,.07); transition: opacity .12s, background .12s; }
    .chip .sw { width: 9px; height: 9px; border-radius: 50%; }
    .chip.off { opacity: .38; background: transparent; box-shadow: inset 0 0 0 1px var(--border); }
    input[type=range] { width: 100%; accent-color: var(--primary); }
    .rangeval { font-size: 12px; color: var(--primary); font-weight: 600; text-transform: none; letter-spacing: 0; }
    select { width: 100%; padding: 9px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--card);
      color: var(--ink); font-size: 12.5px; font-family: inherit; }
    .toggle { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink); cursor: pointer; margin-top: 6px; }
    .toggle input { accent-color: var(--primary); }
    #reset { background: none; border: none; color: var(--primary); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; margin-top: 13px; }

    #stats { display: flex; gap: 10px; padding: 4px 20px 12px; }
    .stat { flex: 1; background: var(--card); border-radius: 16px; padding: 10px 14px; box-shadow: 0 3px 12px rgba(49,63,159,.06); }
    .stat .n { font-size: 19px; font-weight: 700; color: var(--primary); }
    .stat .l { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    /* list */
    .list-head { display: flex; justify-content: space-between; align-items: center; padding: 0 20px 6px; }
    .list-head .cnt { font-size: 11px; color: var(--faint); }
    .list-head select { width: auto; font-size: 11px; padding: 4px 8px; }
    .list-tools { display: flex; align-items: center; gap: 6px; }
    #csv { background: var(--card); border: none; color: var(--primary); font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 999px; cursor: pointer; box-shadow: 0 2px 8px rgba(49,63,159,.08); font-family: inherit; }
    #csv:hover { filter: brightness(.97); }
    #digestbox { margin-top: 14px; }
    #ask-note { margin-top: 8px; font-size: 12px; color: var(--muted); background: var(--primary-soft); border-radius: 12px; padding: 8px 12px; line-height: 1.45; }
    #ask-note button { background: none; border: none; color: var(--primary); font-weight: 600; font-size: 12px; cursor: pointer; padding: 0; }
    .chip.on { background: var(--primary); color: #fff; }
    .chip.on .sw { background: #fff !important; }
    .digestrow { display: flex; gap: 7px; }
    .digestrow input { flex: 1; min-width: 0; padding: 9px 12px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--card); color: var(--ink); font-size: 12.5px; font-family: inherit; }
    .digestrow button { background: var(--primary); border: none; color: #fff; border-radius: 999px; padding: 9px 15px;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; flex: none; }
    .digestrow button:hover { filter: brightness(1.08); }
    #list { flex: 1; overflow-y: auto; min-height: 0; padding: 0 14px 14px; }
    #list::-webkit-scrollbar { width: 8px; } #list::-webkit-scrollbar-thumb { background: #e8d3c9; border-radius: 8px; }
    .item { padding: 10px 12px; margin: 0 0 7px; border-radius: 14px; background: var(--tint); cursor: pointer; transition: background .12s; }
    .item:hover { background: var(--card); }
    .item.active { background: var(--card); box-shadow: inset 0 0 0 2px var(--primary-soft); }
    .item .t { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
    .item .t .sw { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .item .t .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item .t .newdot { font-size: 9px; color: #fff; background: var(--new); border-radius: 999px; padding: 2px 7px; font-weight: 700; flex: none; }
    .item .s { font-size: 11.5px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; }
    .item .s .v { color: var(--good); font-weight: 600; }
    .empty { margin: 8px 6px; padding: 18px 16px; border-radius: 16px; background: var(--tint); color: var(--muted); font-size: 12.5px; line-height: 1.5; text-align: center; }
    .empty button { background: none; border: none; color: var(--primary); font-weight: 600; font-size: 12.5px; cursor: pointer; padding: 0; }

    /* floating detail card */
    #detail { position: fixed; top: 16px; right: 16px; bottom: 16px; width: var(--detail-w); background: var(--panel);
      border-radius: 26px; transform: translateX(calc(100% + 28px)); transition: transform .24s ease; z-index: 1200;
      display: flex; flex-direction: column; box-shadow: var(--shadow); overflow: hidden; }
    #detail.open { transform: translateX(0); }
    #detail .dh { padding: 20px 22px 14px; position: relative; }
    #detail .dh .close { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 50%;
      background: var(--tint); border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
    #detail .dh .close:hover { background: var(--primary-soft); color: var(--primary); }
    #detail .dh .cat { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
    #detail .dh h2 { margin: 7px 40px 4px 0; font-size: 17px; line-height: 1.3; }
    #detail .dh .desc { font-size: 12.5px; color: var(--muted); line-height: 1.45; }
    #detail .db { padding: 4px 22px 20px; overflow-y: auto; flex: 1; }
    .confbar { height: 8px; border-radius: 999px; background: var(--primary-soft); overflow: hidden; margin: 2px 0 5px; }
    .confbar > span { display: block; height: 100%; border-radius: 999px; background: var(--primary); }
    .conftxt { font-size: 11.5px; color: var(--muted); margin-bottom: 15px; }
    .kv { display: grid; grid-template-columns: 96px 1fr; gap: 7px 10px; font-size: 13px; }
    .kv .k { color: var(--muted); }
    .kv .v { color: var(--ink); overflow-wrap: anywhere; }
    .kv .v.big { color: var(--good); font-weight: 700; }
    .kv a { color: var(--primary); }
    .dactions { display: flex; gap: 8px; margin-top: 18px; }
    .dactions a, .dactions button { flex: 1; text-align: center; font-size: 12px; font-weight: 600; padding: 10px 8px;
      border-radius: 999px; border: none; background: var(--card); color: var(--primary); cursor: pointer; text-decoration: none;
      box-shadow: 0 2px 8px rgba(49,63,159,.08); font-family: inherit; }
    .dactions a:first-child { background: var(--primary); color: #fff; }
    .dactions a:hover, .dactions button:hover { filter: brightness(.97); }

    /* accounts + alerts */
    #account { margin-top: 10px; font-size: 12px; }
    .seolinks { margin-top: 8px; font-size: 11px; } .seolinks a { color: var(--muted); text-decoration: none; } .seolinks a:hover { color: var(--primary); }
    .btn { background: var(--card); border: none; color: var(--primary); border-radius: 999px; padding: 8px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(49,63,159,.1); font-family: inherit; }
    .btn:hover { filter: brightness(.97); }
    .btn.primary { background: var(--primary); color: #fff; }
    .link-btn { background: none; border: none; color: var(--primary); cursor: pointer; font: inherit; font-weight: 600; padding: 0; }
    .protag { background: var(--good); color: #fff; font-weight: 700; font-size: 10px; padding: 2px 8px; border-radius: 999px; letter-spacing: .5px; }
    #account .who { color: var(--muted); } #account .who b { color: var(--ink); }
    #alertme { width: 100%; margin-top: 14px; background: var(--primary); border: none; color: #fff;
      border-radius: 999px; padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px rgba(49,63,159,.25); }
    #alertme:hover { filter: brightness(1.08); }
    #modal { position: fixed; inset: 0; background: rgba(35,42,82,.4); display: none; place-items: center; z-index: 2000; }
    #modal.open { display: grid; }
    .sheet { position: relative; background: var(--panel); border-radius: 24px; width: min(430px, 92vw);
      padding: 26px; box-shadow: 0 30px 80px rgba(35,42,82,.35); }
    .sheet h3 { margin: 0 0 6px; font-size: 17px; }
    .sheet p { margin: 0 0 14px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .sheet input { width: 100%; padding: 11px 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--card);
      color: var(--ink); font-size: 13px; font-family: inherit; margin-bottom: 11px; }
    .sheet .muted { color: var(--muted); font-size: 12px; }
    .sheet .close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .alertrow { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .alertrow .x { color: #d05a5a; background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink);
      color: #fff; padding: 12px 18px; border-radius: 999px; font-size: 13px; z-index: 2100; box-shadow: 0 10px 30px rgba(35,42,82,.35); max-width: 90vw; }

    /* map furniture */
    /* project pins: a soft rounded chip carrying the category glyph */
    .pin { display: grid; place-items: center; width: 100%; height: 100%; background: var(--c, var(--primary));
      border-radius: 32%; box-shadow: inset 0 0 0 1.5px rgba(255,255,255,.4), 0 3px 9px rgba(35,42,82,.3);
      transition: transform .1s ease; }
    .pin svg { width: 64%; height: 64%; fill: #fff; display: block; }
    .pin:hover { transform: scale(1.18); }
    .pin.ring-new { box-shadow: 0 0 0 2.5px var(--new), inset 0 0 0 1.5px rgba(255,255,255,.4), 0 3px 9px rgba(35,42,82,.3); }
    .pin.ring-started { box-shadow: 0 0 0 2.5px var(--good), inset 0 0 0 1.5px rgba(255,255,255,.4), 0 3px 9px rgba(35,42,82,.3); }
    /* legend chips reuse the pin look at a small size */
    .legend-pin { width: 15px; height: 15px; border-radius: 32%; display: inline-grid; place-items: center; flex: none; }
    .legend-pin svg { width: 10px; height: 10px; fill: #fff; display: block; }
    .leaflet-control-layers, .leaflet-bar a { background: var(--card); color: var(--ink); border-color: #f0e4dd !important; }
    .leaflet-bar a:hover { background: var(--tint); }
    .leaflet-control-layers-expanded { padding: 8px 12px 8px 10px; font-size: 13px; border-radius: 14px; font-family: inherit; }
    .leaflet-control-layers { border-radius: 14px; box-shadow: 0 6px 20px rgba(49,63,159,.14); }
    .leaflet-control-layers label { margin: 4px 0; cursor: pointer; }
    .leaflet-touch .leaflet-bar, .leaflet-touch .leaflet-control-layers { border: none; box-shadow: 0 6px 20px rgba(49,63,159,.14); }
    .leaflet-control-attribution { background: rgba(255,255,255,.72) !important; color: var(--muted) !important; }
    .leaflet-control-attribution a { color: var(--primary) !important; }
    .leaflet-tooltip.sw-tip { background: var(--card); border: none; color: var(--ink); font-size: 12px; font-family: Poppins, "Segoe UI", sans-serif;
      font-weight: 600; padding: 5px 10px; border-radius: 10px; box-shadow: 0 6px 18px rgba(49,63,159,.18); }
    .leaflet-tooltip.sw-tip::before { display: none; }
    #legend { position: fixed; bottom: 16px; left: calc(16px + var(--sidebar-w) + 12px); z-index: 1000; background: var(--card);
      border-radius: 16px; padding: 10px 14px; font-size: 11.5px; color: var(--muted);
      box-shadow: 0 8px 24px rgba(49,63,159,.12); transition: left .28s ease; }
    #app.collapsed #legend { left: 28px; }
    #legend .lr { display: flex; align-items: center; gap: 7px; margin: 2px 0; }
    #legend .sw { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    #legend .hr { height: 1px; background: var(--border); margin: 6px 0; }
    #loading { position: absolute; inset: 0; display: grid; place-items: center; z-index: 1500; pointer-events: none; }
    #loading span { background: var(--panel); color: var(--muted); font-size: 13.5px; padding: 14px 22px; border-radius: 999px; box-shadow: var(--shadow); }

    #sheet-handle { display: none; }
    @media (max-width: 760px) {
      #sb-toggle { display: none; }
      #app { --sheet-h: 46vh; }
      #app.peek { --sheet-h: 15vh; }
      #map { bottom: var(--sheet-h); }
      #sidebar { left: 0; right: 0; top: auto; bottom: 0; width: auto; height: var(--sheet-h); border-radius: 26px 26px 0 0;
        transform: none !important; transition: height .25s ease; }
      /* grab-handle: tap to swap between full panel and a slim peek (more map) */
      #sheet-handle { display: grid; place-items: center; height: 30px; flex: none; background: none; border: none; cursor: pointer; }
      #sheet-handle span { width: 44px; height: 5px; border-radius: 999px; background: var(--border); }
      #app.peek .controls, #app.peek .list-head, #app.peek #list { display: none; }
      /* legend lives above the sheet, toggled by the ⓘ chip */
      #legend { display: none; left: 12px; bottom: calc(var(--sheet-h) + 12px); transition: bottom .25s ease; }
      #app.show-legend #legend { display: block; }
      #legend-btn { display: inline-flex; }
      #detail { top: 8vh; left: 10px; right: 10px; bottom: 0; width: auto; border-radius: 26px 26px 0 0; }
      #detail .dh .close { width: 38px; height: 38px; font-size: 22px; }
      #search, select, .sheet input { font-size: 16px; } /* prevent iOS focus zoom */
      .chip { padding: 8px 14px; }
    }
    #legend-btn { display: none; align-items: center; font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 999px; border: none; background: var(--tint); color: var(--muted); cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <h2 class="sr-only">SiteWatch: a live map of commercial construction sites across Texas, filterable by category, value, and likelihood of active construction.</h2>
  <div id="app">
    <main id="map"></main>
    <aside id="sidebar">
      <button id="sheet-handle" aria-label="Expand or collapse the panel"><span></span></button>
      <div id="brand">
        <h1><span class="dot">●</span> SiteWatch — <span id="region">Texas</span></h1>
        <div class="meta-row">
          <span id="badge">loading…</span>
          <span id="through"></span>
          <button id="legend-btn" aria-pressed="false">ⓘ legend</button>
        </div>
        <div id="account"></div>
        <div class="seolinks"><a href="/insights">📊 Texas construction report</a> · <a href="/companies">Companies</a></div>
      </div>

      <div class="controls">
        <label class="lbl" for="ask">✨ Ask the map</label>
        <div class="digestrow">
          <input id="ask" type="text" placeholder="e.g. tilt-wall warehouses near me over $5M" autocomplete="off" />
          <button id="ask-go">Ask</button>
        </div>
        <div id="ask-note" hidden></div>

        <label class="lbl" for="search">Search address · owner · architect · scope</label>
        <input id="search" type="text" placeholder="e.g. tilt wall, ISD, Hines, Westheimer…" autocomplete="off" />

        <label class="lbl">Jump to metro</label>
        <div class="chips" id="metros"></div>
        <div id="nearrow" hidden>
          <label class="lbl" for="radius">Within <span id="radiusout" class="rangeval">30 mi</span> of your location</label>
          <input id="radius" type="range" min="5" max="150" step="5" value="30" />
        </div>

        <label class="lbl">Category</label>
        <div class="chips" id="cats"></div>

        <label class="lbl">Type of work</label>
        <div class="chips" id="works"></div>

        <label class="lbl" for="conf">Min. likelihood of active construction — <span id="confout" class="rangeval">0%</span></label>
        <input id="conf" type="range" min="0" max="90" step="10" value="0" />

        <label class="lbl" for="val">Min. declared value — <span id="valout" class="rangeval">$0+</span></label>
        <input id="val" type="range" min="0" max="0" value="0" step="100000" />

        <label class="lbl" for="since">Registered within</label>
        <select id="since">
          <option value="0">Any time</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="180">Last 6 months</option>
          <option value="365">Last year</option>
        </select>

        <label class="toggle"><input type="checkbox" id="newonly" /> Only show new this week <span id="newcnt" style="color:var(--new);font-weight:600"></span></label>
        <label class="toggle"><input type="checkbox" id="startedonly" /> 🚧 Just started construction <span id="startedcnt" style="color:var(--good);font-weight:600"></span></label>
        <button id="reset">Reset filters</button>
        <button id="alertme" hidden>🔔 Alert me about this search</button>
        <div id="digestbox" hidden>
          <label class="lbl" for="digest-email">Free weekly digest — new projects &amp; groundbreakings</label>
          <div class="digestrow">
            <input id="digest-email" type="email" placeholder="you@company.com" autocomplete="email" />
            <button id="digest-go">Sign up</button>
          </div>
        </div>
      </div>

      <div id="stats">
        <div class="stat"><div class="n" id="stat-count">—</div><div class="l">Sites shown</div></div>
        <div class="stat"><div class="n" id="stat-value">—</div><div class="l">Declared value</div></div>
      </div>

      <div class="list-head">
        <span class="cnt" id="list-cnt"></span>
        <span class="list-tools">
          <button id="csv" title="Download the filtered list as a spreadsheet (CSV)">⬇ CSV</button>
          <select id="sort">
            <option value="new">Newest first</option>
            <option value="value">Highest value</option>
            <option value="sqft">Largest sq ft</option>
          </select>
        </span>
      </div>
      <div id="list"></div>
    </aside>

    <button id="sb-toggle" aria-label="Toggle panel" title="Hide panel">‹</button>
    <div id="legend"></div>
  </div>

  <aside id="detail" aria-hidden="true">
    <div class="dh">
      <button class="close" id="detail-close" aria-label="Close">×</button>
      <div class="cat" id="d-cat"></div>
      <h2 id="d-title"></h2>
      <div class="desc" id="d-desc"></div>
    </div>
    <div class="db">
      <div class="confbar"><span id="d-confbar"></span></div>
      <div class="conftxt" id="d-conftxt"></div>
      <div class="kv" id="d-kv"></div>
      <div class="dactions">
        <a id="d-page" target="_blank" rel="noopener">Details ↗</a>
        <a id="d-tdlr" target="_blank" rel="noopener">TDLR ↗</a>
        <button id="d-copy">Copy link</button>
      </div>
    </div>
  </aside>

  <div id="modal"><div class="sheet" id="sheet"></div></div>
  <div id="loading"><span>Loading construction sites…</span></div>

  <script>
    // ── Accounts + alerts (optional) ────────────────────────────────────────
    // Paste your Supabase project URL + anon (public) key to enable sign-in and
    // saved-search email alerts. Leave blank to run the public map with no accounts.
    window.SITEWATCH = { supabaseUrl: '', supabaseAnonKey: '' };
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const COLORS = { commercial:'#4356c0', industrial:'#e2984a', institutional:'#e58a9e', multifamily:'#5cae8d', residential:'#9ba3c4', unknown:'#a6adbf' };
    const CAT_LABELS = { commercial:'Commercial', industrial:'Industrial', institutional:'Institutional', multifamily:'Multifamily', residential:'Residential', unknown:'Unknown' };
    // One simple silhouette per category — a storefront, a factory, a columned
    // civic building, an apartment block, a house. Inline SVG: no requests.
    const GLYPHS = {
      commercial:    'M4 3h16v3H4zM5 7h14l1 4a3 3 0 01-3 3 3 3 0 01-3-2.5A3 3 0 0112 14a3 3 0 01-3-2.5A3 3 0 016 14a3 3 0 01-3-3zM5 15.6A5 5 0 006 16a4.6 4.6 0 003-1 4.6 4.6 0 006 0 4.6 4.6 0 003 1 5 5 0 001-.4V21H5z',
      industrial:    'M4 8h3V4h2v4h1l4 3V8l6 4v9H3V11zM6 15h2v2H6zm5 0h2v2h-2zm5 0h2v2h-2z',
      institutional: 'M12 2l9 6H3zM4.5 9.5h2V17h-2zM11 9.5h2V17h-2zM17.5 9.5h2V17h-2zM3.5 18h17v3h-17z',
      multifamily:   'M5 21V3h9v18h-3.2v-3.5H8.2V21zM7 6h2v2H7zm3.5 0h2v2h-2zM7 10h2v2H7zm3.5 0h2v2h-2zM16 21V8h3.5v13zm1-11h1.6v2H17zm0 4h1.6v2H17z',
      residential:   'M12 3.5l8.5 7.5H18v9h-4v-5.5h-4V20H6v-9H3.5z',
      unknown:       'M12 6a6 6 0 110 12 6 6 0 010-12z',
    };
    const pinSvg = (cat) => `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="${GLYPHS[cat] || GLYPHS.unknown}"/></svg>`;
    const WORK_LABELS = { new_construction:'New construction', addition:'Addition', shell:'Shell', remodel:'Renovation', other:'Other', unknown:'Other' };
    const RING_STARTED = '#3f9d77', RING_NEW = '#e9a23b';
    const DAY = 864e5;

    const fmtUSD = (n) => !n ? '—' : '$' + Number(n).toLocaleString();
    const fmtShort = (n) => { if (!n) return '$0'; if (n>=1e9) return '$'+(n/1e9).toFixed(1)+'B'; if (n>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if (n>=1e3) return '$'+Math.round(n/1e3)+'K'; return '$'+n; };
    const fmtSqft = (n) => !n ? null : Number(n).toLocaleString()+' ft²';
    const statusText = (p) => { const m = /\(([^)]+)\)\s*$/.exec(p.description||''); return m ? m[1] : (p.status||'—'); };

    const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([31.2, -98.5], 6);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    const ATTR = '&copy; OpenStreetMap &copy; CARTO · data: TDLR TABS';
    const baseLayers = {
      'Soft': L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: ATTR, subdomains: 'abcd', maxZoom: 20 }),
      'Light': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: ATTR, subdomains: 'abcd', maxZoom: 20 }),
      'Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: ATTR, subdomains: 'abcd', maxZoom: 20 }),
      'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Imagery &copy; Esri · data: TDLR TABS', maxZoom: 19 }),
    };
    baseLayers['Soft'].addTo(map);
    L.control.layers(baseLayers, null, { position: 'topright' }).addTo(map);

    // No clustering, no count bubbles — FlightRadar-style. EVERY site is always
    // on the map as a small category-colored dot (one shared canvas, cheap at
    // any zoom); once you're close enough to read them (PIN_ZOOM), the glyph
    // chips render on top for whatever is in the viewport.
    const PIN_ZOOM = 11;
    const PIN_CAP = 1500; // safety: never mount more chip DOM nodes than this
    const dotRenderer = L.canvas({ padding: 0.4 });
    const dotsGroup = L.layerGroup().addTo(map);
    const pinsGroup = L.layerGroup().addTo(map);

    let FEATURES = [], MARKERS = [], byId = new Map(), now = Date.now(), DATA_AGE_DAYS = null;
    const state = { q:'', cats:new Set(), works:new Set(), minConf:0, minVal:0, since:0, newOnly:false, startedOnly:false, sort:'new', center:null, radiusMi:30 };
    // Three size tiers by declared value — enough to read hierarchy at a glance
    // without the mushy continuum the old radius formula produced.
    const pinSize = (v) => (v >= 25e6 ? 30 : v >= 2e6 ? 24 : 19);
    const isNew = (p) => p.issuedDate && (now - Date.parse(p.issuedDate)) <= 7*DAY;

    function passes(p, m) {
      if (!state.cats.has(p.category)) return false;
      if (state.works.size && !state.works.has(p.workClass)) return false;
      if ((p.confidence||0)*100 < state.minConf) return false;
      if ((p.valuation||0) < state.minVal) return false;
      if (state.since && (!p.issuedDate || (now - Date.parse(p.issuedDate)) > state.since*DAY)) return false;
      if (state.newOnly && !isNew(p)) return false;
      if (state.startedOnly && !p.justStarted) return false;
      if (state.center && m) {
        if (milesBetween(state.center, m.ll) > state.radiusMi) return false;
      }
      if (state.q) {
        // Every term must match somewhere — including the scope-of-work text,
        // which is where trade/material language ("tilt wall", "metal building",
        // "sitework") actually lives in TABS records.
        const hay = [p.address, p.description, p.owner, p.designFirm, p.facilityName, p.scopeOfWork, p.tenantName]
          .filter(Boolean).join(' ').toLowerCase();
        for (const t of state.q.toLowerCase().split(/\s+/)) {
          if (t && !hay.includes(t)) return false;
        }
      }
      return true;
    }

    function milesBetween(a, b) {
      const dLat = (a.lat - b.lat) * 69;
      const dLng = (a.lng - b.lng) * 69 * Math.cos((a.lat * Math.PI) / 180);
      return Math.sqrt(dLat * dLat + dLng * dLng);
    }

    let LAST_VISIBLE = [];
    function apply() {
      const visible = [];
      for (const m of MARKERS) if (passes(m._p, m)) visible.push(m);
      LAST_VISIBLE = visible;
      redrawMap();
      let total = 0; for (const v of visible) total += v._p.valuation || 0;
      document.getElementById('stat-count').textContent = visible.length.toLocaleString();
      document.getElementById('stat-value').textContent = fmtShort(total);
      renderList(visible);
    }

    // Export the CURRENT filtered set (all of it, not just the listed 250) as a
    // CSV — sales teams live in spreadsheets and CRMs, not maps.
    document.getElementById('csv').onclick = () => {
      if (!LAST_VISIBLE.length) return toast('Nothing to export — adjust the filters first.');
      const cols = [
        ['Permit', p => p.permitNumber], ['Name', p => p.facilityName], ['Address', p => p.address],
        ['Category', p => p.category], ['Work', p => WORK_LABELS[p.workClass] || p.workClass], ['Status', p => statusText(p)],
        ['% active', p => p.confidence != null ? Math.round(p.confidence * 100) : ''], ['Value', p => p.valuation],
        ['Sq ft', p => p.squareFeet], ['Registered', p => p.issuedDate], ['Est. start', p => p.estStartDate],
        ['Est. end', p => p.estEndDate], ['Started', p => p.startedAt], ['Owner', p => p.owner], ['Owner phone', p => p.ownerPhone],
        ['Architect', p => p.designFirm], ['Architect phone', p => p.designFirmPhone], ['Contact', p => p.contactName],
        ['Tenant', p => p.tenantName], ['Tenant phone', p => p.tenantPhone], ['RAS', p => p.rasName], ['RAS phone', p => p.rasPhone], ['ZIP', p => p.zip],
        ['Lat', p => byId.get(p.permitNumber)?.ll.lat], ['Lng', p => byId.get(p.permitNumber)?.ll.lng],
        ['TDLR page', p => /^TABS/.test(p.permitNumber || '') ? `https://www.tdlr.texas.gov/TABS/Search/Project/${p.permitNumber}` : ''],
      ];
      const cell = (v) => { const s = v == null ? '' : String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
      const lines = [cols.map(c => c[0]).join(',')];
      for (const v of LAST_VISIBLE) lines.push(cols.map(c => cell(c[1](v._p))).join(','));
      const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `sitewatch-${new Date().toISOString().slice(0,10)}-${LAST_VISIBLE.length}-sites.csv`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      toast(`Exported ${LAST_VISIBLE.length.toLocaleString()} sites ✓`);
    };

    function renderList(visible) {
      const el = document.getElementById('list');
      if (!visible.length) {
        document.getElementById('list-cnt').textContent = '0 sites';
        const staleNote = DATA_AGE_DAYS != null && DATA_AGE_DAYS > 3
          ? `<br>Heads up: the data was last updated ${DATA_AGE_DAYS} days ago, so time-based filters like “new this week” may be empty.` : '';
        el.innerHTML = `<div class="empty">No sites match these filters.${staleNote}<br><button id="empty-reset">Reset filters</button></div>`;
        document.getElementById('empty-reset').onclick = () => document.getElementById('reset').click();
        return;
      }
      const sort = state.sort;
      visible.sort((a,b) => sort==='value' ? (b._p.valuation||0)-(a._p.valuation||0)
        : sort==='sqft' ? (b._p.squareFeet||0)-(a._p.squareFeet||0)
        : (Date.parse(b._p.issuedDate||0)||0)-(Date.parse(a._p.issuedDate||0)||0));
      const cap = 250, shown = visible.slice(0, cap);
      document.getElementById('list-cnt').textContent = visible.length > cap ? `showing ${cap} of ${visible.length.toLocaleString()}` : `${visible.length.toLocaleString()} sites`;
      el.innerHTML = shown.map(v => { const p = v._p; const c = COLORS[p.category]||COLORS.unknown;
        return `<div class="item" data-id="${p.permitNumber}">
          <div class="t"><span class="sw" style="background:${c}"></span><span class="name">${esc(p.facilityName || p.address || 'Unknown')}</span>${p.justStarted?'<span class="newdot" style="background:var(--good)">STARTED</span>':isNew(p)?'<span class="newdot">NEW</span>':''}</div>
          <div class="s"><span class="v">${fmtShort(p.valuation)}</span><span>${WORK_LABELS[p.workClass]||''}</span><span>${esc((p.address||'').split(',').slice(1).join(',').trim())}</span></div>
        </div>`; }).join('');
      for (const node of el.children) node.onclick = () => focusProject(node.dataset.id, true);
    }

    function makeEntry(f, dupIndex) {
      const p = f.properties, [lng, lat] = f.geometry.coordinates;
      // Stacked projects on one coordinate get a tiny deterministic ring offset
      // so chips don't perfectly eclipse each other once you zoom in (~18 m).
      let ll;
      if (dupIndex) {
        const a = dupIndex * 2.4, r = 0.00016 * (1 + Math.floor(dupIndex / 8));
        ll = L.latLng(lat + r * Math.sin(a), lng + r * Math.cos(a));
      } else ll = L.latLng(lat, lng);
      const c = COLORS[p.category] || COLORS.unknown;
      // Opacity encodes confidence: a site we believe is actively building reads
      // solid; a decayed/past-due one visibly fades instead of lying.
      const op = .45 + .55 * (p.confidence ?? .5);
      const ringCol = p.justStarted ? RING_STARTED : isNew(p) ? RING_NEW : null; // green=started, amber=new
      const dot = L.circleMarker(ll, {
        renderer: dotRenderer,
        radius: p.valuation >= 25e6 ? 4.6 : p.valuation >= 2e6 ? 3.4 : 2.6,
        fillColor: c, fillOpacity: Math.max(.5, op),
        color: ringCol || '#fff', weight: ringCol ? 1.6 : .8, opacity: ringCol ? .95 : .5,
      });
      const tip = p.facilityName || p.address || 'Project';
      const tipText = p.valuation ? `${tip} · ${fmtShort(p.valuation)}` : tip;
      dot.bindTooltip(tipText, { direction: 'top', offset: [0, -4], className: 'sw-tip' });
      dot.on('click', () => openDetail(p, false));
      return { _p: p, ll, dot, pin: null, tipText };
    }

    // Glyph chips are built lazily — only for what actually enters the viewport.
    function pinFor(e) {
      if (e.pin) return e.pin;
      const p = e._p;
      const c = COLORS[p.category] || COLORS.unknown;
      const ring = p.justStarted ? 'ring-started' : isNew(p) ? 'ring-new' : '';
      const size = pinSize(p.valuation);
      const op = (.45 + .55 * (p.confidence ?? .5)).toFixed(2);
      const m = L.marker(e.ll, {
        icon: L.divIcon({
          html: `<div class="pin ${ring}" style="--c:${c};opacity:${op}">${pinSvg(p.category)}</div>`,
          className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2],
        }),
      });
      m.bindTooltip(e.tipText, { direction: 'top', offset: [0, -size / 2], className: 'sw-tip' });
      m.on('click', () => openDetail(p, false));
      e.pin = m;
      return m;
    }

    function redrawMap() {
      dotsGroup.clearLayers();
      for (const e of LAST_VISIBLE) dotsGroup.addLayer(e.dot);
      refreshPins();
    }
    function refreshPins() {
      pinsGroup.clearLayers();
      if (map.getZoom() < PIN_ZOOM) return;
      const b = map.getBounds().pad(0.2);
      let inView = LAST_VISIBLE.filter((e) => b.contains(e.ll));
      if (inView.length > PIN_CAP) {
        inView = inView.sort((x, y) => (y._p.valuation || 0) - (x._p.valuation || 0)).slice(0, PIN_CAP);
      }
      for (const e of inView) pinsGroup.addLayer(pinFor(e));
    }
    map.on('moveend zoomend', refreshPins);

    function focusProject(id, fromList) {
      const entry = byId.get(id); if (!entry) return;
      map.setView(entry.ll, Math.max(map.getZoom(), 13), { animate: true });
      openDetail(entry._p, false);
      document.querySelectorAll('.item.active').forEach(n => n.classList.remove('active'));
      const node = document.querySelector(`.item[data-id="${CSS.escape(id)}"]`); if (node) node.classList.add('active');
    }

    function openDetail(p, recenter) {
      const c = COLORS[p.category] || COLORS.unknown;
      document.getElementById('d-cat').textContent = CAT_LABELS[p.category] || p.category;
      document.getElementById('d-cat').style.color = c;
      document.getElementById('d-title').textContent = p.facilityName || p.address || 'Project';
      document.getElementById('d-desc').textContent = p.description || '';
      const pct = Math.round((p.confidence||0)*100);
      document.getElementById('d-confbar').style.width = pct + '%';
      document.getElementById('d-conftxt').textContent = `${pct}% likely under active construction · status: ${statusText(p)}`;
      const rows = [];
      const add = (k, v) => { if (v != null && v !== '' && v !== '—') rows.push(`<div class="k">${k}</div><div class="v${k==='Value'?' big':''}">${v}</div>`); };
      const tel = (n) => { const d = String(n||'').replace(/[^0-9+]/g,''); return d ? `<a href="tel:${d}">${esc(n)}</a>` : ''; };
      const party = (name, phone) => { let s = esc(name||''); if (phone) s += (s?' · ':'') + tel(phone); return s || null; };
      add('Value', p.valuation ? fmtUSD(p.valuation) : null);
      add('Size', fmtSqft(p.squareFeet));
      add('Type', WORK_LABELS[p.workClass] || null);
      if (p.scopeOfWork) add('Scope', esc(p.scopeOfWork));
      add('Timeline', (p.estStartDate||p.estEndDate) ? `${p.estStartDate||'?'} → ${p.estEndDate||'?'}` : null);
      add('Registered', p.issuedDate);
      if (p.startedAt) add(p.justStarted ? 'Broke ground' : 'Construction start', `${p.justStarted ? '🚧 ' : ''}${esc(p.startedAt)}`);
      if (p.statusChangedAt && p.firstSeenAt && p.statusChangedAt !== p.firstSeenAt) add('Status updated', esc(p.statusChangedAt) + (p.prevStatus ? ` (from ${esc(p.prevStatus)})` : ''));
      if (p.geocodePrecision && p.geocodePrecision !== 'address') add('Pin accuracy', p.geocodePrecision === 'area' ? 'approximate — area-level match' : 'approximate — street-level match');
      add('Owner', party(p.owner, p.ownerPhone));
      add('Architect', party(p.designFirm, p.designFirmPhone));
      add('Tenant', party(p.tenantName, p.tenantPhone));
      add('RAS', party(p.rasName, p.rasPhone));
      add('Contact', esc(p.contactName));
      add('Contractor', esc(p.contractor));
      add('Funding', p.publicFunds == null ? null : (p.publicFunds ? 'Public' : 'Private'));
      add('Address', esc(p.address));
      add('Permit', p.permitNumber);
      add('Source', (p.sources||[]).join(', '));
      document.getElementById('d-kv').innerHTML = rows.join('');
      const tdlr = document.getElementById('d-tdlr');
      if (/^TABS/.test(p.permitNumber||'')) { tdlr.style.display=''; tdlr.href = `https://www.tdlr.texas.gov/TABS/Search/Project/${p.permitNumber}`; }
      else tdlr.style.display = 'none';
      document.getElementById('d-page').href = '/project/' + (p.permitNumber||'').replace(/[^A-Za-z0-9_-]/g,'');
      document.getElementById('detail').classList.add('open');
      document.getElementById('detail').setAttribute('aria-hidden','false');
      history.replaceState(null,'', '#p=' + encodeURIComponent(p.permitNumber||''));
      if (recenter) { const e = byId.get(p.permitNumber); if (e) map.setView(e.ll, Math.max(map.getZoom(),13)); }
    }
    function closeDetail() { document.getElementById('detail').classList.remove('open'); document.getElementById('detail').setAttribute('aria-hidden','true'); history.replaceState(null,'',' '); }
    document.getElementById('detail-close').onclick = closeDetail;
    document.getElementById('d-copy').onclick = () => navigator.clipboard?.writeText(location.href).then(() => { const b=document.getElementById('d-copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy link',1200); });

    function esc(s){ return s==null ? '' : String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    function buildChips(containerId, values, labels, stateSet, colored) {
      const el = document.getElementById(containerId); el.innerHTML='';
      for (const v of values) { stateSet.add(v);
        const chip = document.createElement('button'); chip.type = 'button'; chip.className='chip'; chip.dataset.v = v; chip.setAttribute('aria-pressed','true');
        chip.innerHTML = (colored ? `<span class="sw" style="background:${COLORS[v]||COLORS.unknown}"></span>` : '') + (labels[v]||v);
        chip.onclick = () => { const on = stateSet.has(v);
          if (on) { stateSet.delete(v); chip.classList.add('off'); } else { stateSet.add(v); chip.classList.remove('off'); }
          chip.setAttribute('aria-pressed', String(!on)); apply(); };
        el.appendChild(chip); }
    }

    let t; const debounce = (fn) => { clearTimeout(t); t = setTimeout(fn, 140); };

    async function load() {
      let loaded = null;
      for (const url of ['/data/texas.geojson','/data/houston.geojson','/data/houston-demo.geojson']) {
        try { const r = await fetch(url); if (r.ok) { loaded = { url, fc: await r.json() }; break; } } catch (e) {}
      }
      const badge = document.getElementById('badge');
      if (!loaded) { document.querySelector('#loading span').textContent = 'No data. Run `npm run pull:texas` (or `npm run demo`).'; badge.textContent='no data'; return; }
      FEATURES = (loaded.fc.features||[]).filter(f => f.geometry && f.geometry.coordinates);
      document.getElementById('region').textContent = loaded.url.includes('texas') ? 'Texas' : 'Houston';
      const isDemo = loaded.url.includes('-demo');

      // build markers + indexes (dup counter drives the stacked-coordinate offsets)
      let maxVal = 0, through = 0, newCount = 0, startedCount = 0;
      const coordSeen = new Map();
      for (const f of FEATURES) {
        const key = f.geometry.coordinates.join(',');
        const dup = coordSeen.get(key) || 0;
        coordSeen.set(key, dup + 1);
        const e = makeEntry(f, dup); MARKERS.push(e); byId.set(f.properties.permitNumber, e);
        maxVal = Math.max(maxVal, f.properties.valuation||0);
        if (f.properties.issuedDate) through = Math.max(through, Date.parse(f.properties.issuedDate));
        if (isNew(f.properties)) newCount++;
        if (f.properties.justStarted) startedCount++;
      }
      // Honest freshness: "live" only when the newest registration is recent;
      // otherwise say exactly how old the data is instead of pretending.
      DATA_AGE_DAYS = through ? Math.max(0, Math.floor((now - through) / DAY)) : null;
      if (isDemo) { badge.textContent = 'demo data'; badge.className = 'demo'; }
      else if (DATA_AGE_DAYS != null && DATA_AGE_DAYS > 3) { badge.textContent = `updated ${DATA_AGE_DAYS} days ago`; badge.className = 'stale'; }
      else { badge.textContent = 'live · TDLR'; badge.className = 'live'; }
      document.getElementById('through').textContent = through ? `data through ${new Date(through).toISOString().slice(0,10)} · ${FEATURES.length.toLocaleString()} sites` : `${FEATURES.length.toLocaleString()} sites`;
      if (newCount) document.getElementById('newcnt').textContent = `(${newCount})`;
      if (startedCount) document.getElementById('startedcnt').textContent = `(${startedCount})`;

      const cats = [...new Set(FEATURES.map(f=>f.properties.category))].sort();
      const works = [...new Set(FEATURES.map(f=>f.properties.workClass))].sort();
      buildChips('cats', cats, CAT_LABELS, state.cats, true);
      buildChips('works', works, WORK_LABELS, state.works, false);
      document.getElementById('legend').innerHTML =
        cats.map((c) => `<div class="lr"><span class="legend-pin" style="background:${COLORS[c] || COLORS.unknown}">${pinSvg(c)}</span>${CAT_LABELS[c] || c}</div>`).join('') +
        `<div class="hr"></div><div class="lr"><span class="sw" style="background:transparent;box-shadow:0 0 0 2px ${RING_STARTED}"></span>just started</div>` +
        `<div class="lr"><span class="sw" style="background:transparent;box-shadow:0 0 0 2px ${RING_NEW}"></span>new this week</div>` +
        `<div class="lr">larger pin = higher value · faded = likely done</div>`;

      const val = document.getElementById('val'); val.max = String(maxVal); val.step = String(Math.max(100000, Math.round(maxVal/100/100000)*100000));
      val.oninput = () => { state.minVal = +val.value; document.getElementById('valout').textContent = fmtShort(state.minVal)+'+'; debounce(apply); };
      const conf = document.getElementById('conf'); conf.oninput = () => { state.minConf = +conf.value; document.getElementById('confout').textContent = state.minConf+'%'; debounce(apply); };
      document.getElementById('since').onchange = (e) => { state.since = +e.target.value; apply(); };
      document.getElementById('newonly').onchange = (e) => { state.newOnly = e.target.checked; apply(); };
      document.getElementById('startedonly').onchange = (e) => { state.startedOnly = e.target.checked; apply(); };
      document.getElementById('sort').onchange = (e) => { state.sort = e.target.value; apply(); };
      document.getElementById('search').oninput = (e) => { state.q = e.target.value.trim(); debounce(apply); };
      document.getElementById('reset').onclick = () => {
        state.minVal=0; state.minConf=0; state.since=0; state.newOnly=false; state.startedOnly=false; state.q='';
        val.value=0; conf.value=0; document.getElementById('valout').textContent='$0+'; document.getElementById('confout').textContent='0%';
        document.getElementById('since').value='0'; document.getElementById('newonly').checked=false; document.getElementById('startedonly').checked=false; document.getElementById('search').value='';
        state.cats=new Set(cats); state.works=new Set(works);
        buildChips('cats', cats, CAT_LABELS, state.cats, true); buildChips('works', works, WORK_LABELS, state.works, false);
        if (state.center) setNear(null); // also clears the near-me radius filter
        apply();
      };

      document.getElementById('loading').style.display = 'none';
      apply();

      // Deep link FIRST — it must not depend on anything below succeeding.
      const m = /#p=([^&]+)/.exec(location.hash);
      const linked = m ? decodeURIComponent(m[1]) : null;
      if (linked && byId.has(linked)) setTimeout(() => focusProject(linked, true), 300);
      // Fit to the data. cluster.getBounds() is unreliable under chunkedLoading
      // (layers add asynchronously → empty bounds → .pad() throws and used to
      // kill the whole load, deep links included) — compute from the features.
      else if (FEATURES.length) {
        try {
          const b = L.latLngBounds(FEATURES.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]));
          if (b.isValid()) map.fitBounds(b.pad(0.05));
        } catch (e) { /* keep the default Texas view */ }
      }
    }
    // ---- accounts + saved-search alerts (optional, Supabase) ----------------
    const SUPA = window.SITEWATCH || {};
    const modal = document.getElementById('modal'), sheet = document.getElementById('sheet');
    let sb = null, user = null, isPro = false;
    const closeModal = () => modal.classList.remove('open');
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    window.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (modal.classList.contains('open')) closeModal();
      else if (document.getElementById('detail').classList.contains('open')) closeDetail();
    });
    function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2800); }
    function openSheet(html) { sheet.innerHTML = `<button class="close" id="x-close">×</button>` + html; modal.classList.add('open'); document.getElementById('x-close').onclick = closeModal; }

    async function initAuth() {
      if (!SUPA.supabaseUrl || !SUPA.supabaseAnonKey) return; // accounts disabled — public map only
      try {
        const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
        sb = createClient(SUPA.supabaseUrl, SUPA.supabaseAnonKey);
        user = (await sb.auth.getSession()).data.session?.user || null;
        await loadPro();
        sb.auth.onAuthStateChange(async (_e, s) => { user = s?.user || null; await loadPro(); renderAccount(); });
        const btn = document.getElementById('alertme');
        btn.hidden = false;
        btn.onclick = () => (!user ? openSignIn() : isPro ? openSave() : openUpgrade());
        initDigestBox();
        renderAccount();
        // returning from a successful Stripe Checkout
        if (/[?&]upgraded=1/.test(location.search)) {
          toast('🎉 Welcome to Pro — alerts unlocked!');
          history.replaceState(null, '', location.pathname);
          setTimeout(async () => { await loadPro(); renderAccount(); }, 1500); // give the webhook a moment
        }
      } catch (err) { console.warn('accounts unavailable:', err); }
    }

    async function loadPro() {
      isPro = false;
      if (!user) return;
      try { const { data } = await sb.from('profiles').select('is_pro').maybeSingle(); isPro = !!data?.is_pro; } catch (e) {}
    }

    // Free weekly digest — the ungated top of the funnel. Insert-only table;
    // duplicates come back as a unique-violation, which we read as "already in".
    function initDigestBox() {
      const box = document.getElementById('digestbox');
      box.hidden = false;
      document.getElementById('digest-go').onclick = async () => {
        const input = document.getElementById('digest-email');
        const email = input.value.trim().toLowerCase();
        if (!/.+@.+\..+/.test(email)) return toast('Enter a valid email address');
        const { error } = await sb.from('digest_subscribers').insert({ email });
        if (error && !/duplicate|unique/i.test(error.message)) return toast(error.message);
        input.value = '';
        toast(error ? "You're already on the list ✓" : "You're in — first digest lands Monday ✓");
      };
    }

    function renderAccount() {
      const el = document.getElementById('account');
      if (user) {
        const tag = isPro ? `<span class="protag">PRO</span> · <button class="link-btn" id="managesub" title="Manage or cancel your subscription">Billing</button>` : `<button class="link-btn" id="upgrade">Upgrade to Pro</button>`;
        el.innerHTML = `<span class="who"><b>${esc(user.email)}</b></span> · ${tag} · <button class="link-btn" id="myalerts">My alerts</button> · <button class="link-btn" id="signout">Sign out</button>`;
        document.getElementById('myalerts').onclick = openManage;
        document.getElementById('signout').onclick = async () => { await sb.auth.signOut(); toast('Signed out'); };
        const up = document.getElementById('upgrade'); if (up) up.onclick = openUpgrade;
        const mg = document.getElementById('managesub');
        if (mg) mg.onclick = async () => {
          mg.disabled = true;
          try {
            const token = (await sb.auth.getSession()).data.session?.access_token;
            const r = await fetch('/api/create-portal', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
            const out = await r.json();
            if (out.url) location.href = out.url; else { toast(out.error || 'Billing portal unavailable'); mg.disabled = false; }
          } catch (e) { toast('Billing portal unavailable'); mg.disabled = false; }
        };
      } else {
        el.innerHTML = `<button class="btn" id="signin">Sign in for alerts</button>`;
        document.getElementById('signin').onclick = openSignIn;
      }
    }

    function openSignIn() {
      openSheet(`<h3>Sign in</h3><p>Enter your email and we'll send a one-click magic link — no password.</p>
        <input type="email" id="si-email" placeholder="you@company.com" autocomplete="email" />
        <button class="btn primary" id="si-send" style="width:100%">Send magic link</button>`);
      document.getElementById('si-send').onclick = async () => {
        const email = document.getElementById('si-email').value.trim(); if (!email) return;
        const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin } });
        closeModal(); toast(error ? error.message : 'Check your email for the sign-in link ✉️');
      };
    }

    function openUpgrade() {
      openSheet(`<h3>Upgrade to Pro</h3>
        <p>The map is free forever. <b>Pro</b> adds saved-search <b>email alerts</b> — get notified the moment a new project matches your filters, with the owner's contact included.</p>
        <button class="btn primary" id="up-go" style="width:100%">Continue to checkout →</button>
        <div class="muted" style="margin-top:10px;text-align:center">Secure checkout via Stripe · cancel anytime</div>`);
      document.getElementById('up-go').onclick = async () => {
        const b = document.getElementById('up-go'); b.textContent = 'Redirecting…'; b.disabled = true;
        try {
          const token = (await sb.auth.getSession()).data.session?.access_token;
          const r = await fetch('/api/create-checkout', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
          const out = await r.json();
          if (out.url) location.href = out.url;
          else { toast(out.error || 'Checkout failed'); b.textContent = 'Continue to checkout →'; b.disabled = false; }
        } catch (e) { toast('Checkout unavailable'); b.textContent = 'Continue to checkout →'; b.disabled = false; }
      };
    }

    function currentFilters() {
      const f = {};
      const nCats = document.getElementById('cats').children.length, nWorks = document.getElementById('works').children.length;
      if (state.cats.size && state.cats.size < nCats) f.categories = [...state.cats];
      if (state.works.size && state.works.size < nWorks) f.workClasses = [...state.works];
      if (state.minVal) f.minValue = state.minVal;
      if (state.minConf) f.minConfidence = state.minConf / 100;
      if (state.q) f.q = state.q;
      if (state.startedOnly) f.event = 'started';
      if (state.center) { f.center = { lat: state.center.lat, lng: state.center.lng }; f.radiusMi = state.radiusMi; }
      return f;
    }
    function filtersSummary(f) {
      const b = [];
      if (f.categories) b.push(f.categories.map((c) => CAT_LABELS[c] || c).join('/'));
      if (f.workClasses) b.push(f.workClasses.map((w) => WORK_LABELS[w] || w).join('/'));
      if (f.minValue) b.push('>' + fmtShort(f.minValue));
      if (f.minConfidence) b.push('≥' + Math.round(f.minConfidence * 100) + '% building');
      if (f.q) b.push('"' + f.q + '"');
      if (f.event === 'started') b.push('🚧 just started');
      if (f.center) b.push(`within ${f.radiusMi} mi`);
      return b.join(' · ') || 'All Texas commercial construction';
    }

    function openSave() {
      const f = currentFilters(), sum = filtersSummary(f);
      openSheet(`<h3>🔔 Alert me</h3><p>Email me when a new project matches these filters:</p>
        <div class="muted" style="margin:-8px 0 12px">${esc(sum)}</div>
        <input type="text" id="al-name" value="${esc(sum)}" />
        <button class="btn primary" id="al-save" style="width:100%">Create alert</button>`);
      document.getElementById('al-save').onclick = async () => {
        const name = document.getElementById('al-name').value.trim() || sum;
        // user_id: schema.sql also defaults it to auth.uid(); sent explicitly so
        // the insert works on databases created before that default existed.
        const { error } = await sb.from('saved_searches').insert({ user_id: user.id, name, email: user.email, filters: f });
        closeModal(); toast(error ? error.message : "Alert created — we'll email you when new sites match ✓");
      };
    }

    async function openManage() {
      openSheet(`<h3>Your alerts</h3><p class="muted">Loading…</p>`);
      const { data, error } = await sb.from('saved_searches').select('id,name').order('created_at', { ascending: false });
      const body = error ? `<p class="muted">${esc(error.message)}</p>`
        : (data.length ? data.map((s) => `<div class="alertrow"><span>${esc(s.name)}</span><button class="x" data-id="${s.id}">Delete</button></div>`).join('')
                       : `<p class="muted">No alerts yet. Set filters on the map, then “Alert me about this search.”</p>`);
      openSheet(`<h3>Your alerts</h3>${body}`);
      sheet.querySelectorAll('.x').forEach((btn) => (btn.onclick = async () => { await sb.from('saved_searches').delete().eq('id', btn.dataset.id); btn.closest('.alertrow').remove(); toast('Alert deleted'); }));
    }

    const appEl = document.getElementById('app');

    // metro quick-jumps
    const METROS = [
      ['Houston', 29.76, -95.37, 10], ['DFW', 32.85, -97.03, 9], ['Austin', 30.27, -97.74, 10],
      ['San Antonio', 29.42, -98.49, 10], ['El Paso', 31.77, -106.44, 10],
    ];
    const metroEl = document.getElementById('metros');
    for (const [name, lat, lng, z] of METROS) {
      const b = document.createElement('button'); b.type = 'button'; b.className = 'chip'; b.textContent = name;
      b.onclick = () => { map.flyTo([lat, lng], z, { duration: 1.1 }); if (window.innerWidth <= 760) appEl.classList.add('peek'); };
      metroEl.appendChild(b);
    }

    // "Near me": geolocate once, then filter to a radius (slider appears).
    const nearBtn = document.createElement('button');
    nearBtn.type = 'button'; nearBtn.className = 'chip'; nearBtn.id = 'nearme'; nearBtn.textContent = '📍 Near me';
    metroEl.appendChild(nearBtn);
    const nearRow = document.getElementById('nearrow');
    const radiusEl = document.getElementById('radius');

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          () => resolve(null),
          { timeout: 8000, maximumAge: 300000 }
        );
      });
    }
    function setNear(center, radiusMi) {
      state.center = center;
      if (radiusMi) { state.radiusMi = radiusMi; radiusEl.value = String(Math.min(150, Math.max(5, radiusMi))); }
      nearBtn.classList.toggle('on', !!center);
      nearRow.hidden = !center;
      document.getElementById('radiusout').textContent = state.radiusMi + ' mi';
      if (center) map.flyTo([center.lat, center.lng], state.radiusMi <= 15 ? 11 : state.radiusMi <= 40 ? 9 : 8, { duration: 1.1 });
      apply();
    }
    nearBtn.onclick = async () => {
      if (state.center) return setNear(null);
      nearBtn.textContent = '📍 Locating…';
      const loc = await getLocation();
      nearBtn.textContent = '📍 Near me';
      if (!loc) return toast('Location unavailable — allow location access and try again');
      setNear(loc);
    };
    radiusEl.oninput = () => {
      state.radiusMi = +radiusEl.value;
      document.getElementById('radiusout').textContent = state.radiusMi + ' mi';
      debounce(apply);
    };

    // ✨ Ask the map: Claude turns a plain-English question into map filters
    // (/api/ask). If the endpoint isn't configured, fall back to keyword search.
    const askEl = document.getElementById('ask'), askBtn = document.getElementById('ask-go'), askNote = document.getElementById('ask-note');
    async function runAsk() {
      const q = askEl.value.trim();
      if (!q) return;
      askBtn.disabled = true; askBtn.textContent = '…';
      try {
        const r = await fetch('/api/ask', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q.slice(0, 300) }),
        });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `HTTP ${r.status}`);
        await applyAiFilters(await r.json());
      } catch (e) {
        // graceful degradation: keyword search on the question, minus filler
        // words that would zero out the ALL-terms-must-match search.
        const STOP = /^(projects?|construction|sites?|buildings?|show|me|all|the|a|an|in|of|for|near|nearby|around|with|that|are|is|being|built|new|currently)$/i;
        const kept = q.split(/\s+/).filter((t) => !STOP.test(t)).join(' ') || q;
        document.getElementById('reset').click();
        state.q = kept; document.getElementById('search').value = kept; apply();
        askNote.hidden = false;
        askNote.innerHTML = `AI search unavailable (${esc(String(e.message || e))}) — ran a keyword search instead. <button id="ask-clear">Clear</button>`;
        document.getElementById('ask-clear').onclick = clearAsk;
      }
      askBtn.disabled = false; askBtn.textContent = 'Ask';
    }
    askBtn.onclick = runAsk;
    askEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') runAsk(); });
    function clearAsk() { askNote.hidden = true; askEl.value = ''; document.getElementById('reset').click(); }

    async function applyAiFilters(f) {
      document.getElementById('reset').click(); // clean slate (also clears near-me)
      // category / work-type chips: turn OFF everything not requested
      if (Array.isArray(f.categories) && f.categories.length) {
        for (const chip of document.querySelectorAll('#cats .chip')) if (!f.categories.includes(chip.dataset.v)) chip.click();
      }
      if (Array.isArray(f.workClasses) && f.workClasses.length) {
        for (const chip of document.querySelectorAll('#works .chip')) if (!f.workClasses.includes(chip.dataset.v)) chip.click();
      }
      if (f.minValue) { state.minVal = f.minValue; document.getElementById('valout').textContent = fmtShort(f.minValue) + '+';
        const val = document.getElementById('val'); if (+val.max >= f.minValue) val.value = String(f.minValue); }
      if (f.minConfidence) { const pct = Math.min(90, Math.round(f.minConfidence * 10) * 10);
        state.minConf = pct; document.getElementById('conf').value = String(pct); document.getElementById('confout').textContent = pct + '%'; }
      if (f.sinceDays) { const opts = [7, 30, 90, 180, 365]; const pick = opts.find((o) => o >= f.sinceDays) || 365;
        state.since = pick; document.getElementById('since').value = String(pick); }
      if (f.startedOnly) { state.startedOnly = true; document.getElementById('startedonly').checked = true; }
      const terms = [...(f.keywords || []), ...(f.companies || [])].join(' ').trim();
      if (terms) { state.q = terms; document.getElementById('search').value = terms; }
      if (f.nearMe) {
        const loc = await getLocation();
        if (loc) setNear(loc, f.radiusMi || 30);
        else toast('Location unavailable — showing statewide results');
      }
      apply();
      askNote.hidden = false;
      askNote.innerHTML = `${esc(f.explanation || 'Filters applied.')} · <b>${document.getElementById('stat-count').textContent}</b> sites match. <button id="ask-clear">Clear</button>`;
      document.getElementById('ask-clear').onclick = clearAsk;
    }

    // mobile bottom sheet: tap the handle to swap panel <-> map real estate
    const sheetHandle = document.getElementById('sheet-handle');
    sheetHandle.onclick = () => {
      appEl.classList.toggle('peek');
      setTimeout(() => map.invalidateSize(), 280); // map height changed
    };
    // mobile legend toggle
    const legendBtn = document.getElementById('legend-btn');
    legendBtn.onclick = () => {
      const on = appEl.classList.toggle('show-legend');
      legendBtn.setAttribute('aria-pressed', String(on));
    };

    // collapsible floating panel — more map when you want it
    const sbToggle = document.getElementById('sb-toggle');
    function setCollapsed(c) {
      appEl.classList.toggle('collapsed', c);
      sbToggle.textContent = c ? '›' : '‹';
      sbToggle.title = c ? 'Show panel' : 'Hide panel';
      try { localStorage.setItem('sw-collapsed', c ? '1' : '0'); } catch (e) {}
      // map is full-bleed behind the floating panel — no resize needed
    }
    sbToggle.onclick = () => setCollapsed(!appEl.classList.contains('collapsed'));
    setCollapsed((() => { try { return localStorage.getItem('sw-collapsed') === '1'; } catch (e) { return false; } })());

    load();
    initAuth();
  </script>
</body>
</html>
