name: Refresh SiteWatch

# Rebuilds the statewide dataset and redeploys the live site on a schedule, so the
# map updates itself with no manual steps.
#
# One-time setup (see DEPLOY.md):
#   1. Push this repo to GitHub.
#   2. Add two repository secrets (Settings → Secrets and variables → Actions):
#        CLOUDFLARE_API_TOKEN   — Cloudflare → My Profile → API Tokens → "Edit Cloudflare Pages"
#        CLOUDFLARE_ACCOUNT_ID  — Cloudflare dashboard → Workers & Pages → Account ID

on:
  schedule:
    - cron: '0 9 * * *'    # daily at 09:00 UTC (~4am Central)
  workflow_dispatch: {}     # + a manual "Run workflow" button

concurrency:
  group: sitewatch-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Backend (Supabase + Resend) — optional. The load/alert/digest steps
      # below self-skip while these secrets are unset, so the map refresh works
      # standalone; add the secrets and the alert pipeline turns on.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_FROM: ${{ secrets.ALERT_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Persist the geocode + detail caches between runs so re-pulls stay cheap
      # (skip TDLR for known projects, skip geocoding for known addresses).
      - name: Restore caches
        uses: actions/cache@v4
        with:
          # The three state files also live in git as a warm seed for run #1;
          # the cache restores newer generations over them on later runs.
          # texas.geojson is cached so the publish guard (writers.js) has a
          # previous-run baseline to compare against in CI, not just locally.
          path: |
            data/geocode-cache.json
            data/tabs-detail-cache.json
            data/history.json
            data/texas.geojson
          key: sitewatch-caches-${{ github.run_id }}
          restore-keys: |
            sitewatch-caches-

      - name: Pull fresh data + build dist/
        env:
          # Bound the slow OSM fallback in CI; the cache fills the long tail over
          # successive daily runs. (Run it uncapped locally for the first full seed.)
          GEOCODER_FALLBACK_MAX: '800'
        run: npm run refresh

      - name: Load projects into Supabase
        if: env.SUPABASE_URL != ''
        run: npm run load

      - name: Send Pro saved-search alerts
        if: env.SUPABASE_URL != ''
        run: npm run alerts

      - name: Send the free weekly digest (Mondays)
        if: env.SUPABASE_URL != ''
        run: if [ "$(date -u +%u)" = "1" ]; then node backend/alert-worker.mjs digest; fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch main pins this to the Production environment (the project's
          # production branch); anything else would silently land as a Preview.
          command: pages deploy dist --project-name sitewatch --branch main
